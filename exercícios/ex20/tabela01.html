<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 400px;
            border-collapse: collapse;
        }

        tr.linha{
            background-color: grey;
        }

        td{
            padding: 8px;
            border: 1px solid black;
        }

        td.dado{
            background-color: yellow;
        }

        td.dados{
            background-color: blue;
        }
    </style>

</head>
<body>

    <h1>Minha primeira tabela</h1>

    <table>
        <tr>
            <td class="dados">A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <tr class="linha">
            <td>A2</td>
            <td>B2</td>
            <td class="dado">C2</td>
        </tr>

        <tr>
            <td>A3</td>
            <td class="dados">B3</td>
            <td>C3</td>
        </tr>

        <tr class="linha">
            <td class="dado">A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>

    <h2>Outra tabela</h2>
    <table>
        <tr class="linha">
            <td>A2</td>
            <td>B3</td>
            <td>C4</td>
        </tr>
        <tr>
            <td>A2</td>
            <td class="dado">B3</td>
            <td>C3</td>
        </tr>

        <tr class="linha">
            <td>A2</td>
            <td>B3</td>
            <td>C4</td>
        </tr>
    </table>
    
</body>
</html>
